<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medistock — Acceso</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--border);
        }
        .tab-btn {
            flex: 1;
            padding: 0.75rem;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-brand">
            <div class="brand-logo">MEDI<span>STOCK</span></div>
            <p class="brand-subtitle">
                Sistema de Gestión Farmacéutica Profesional. Control total de inventario, ventas y despacho.
            </p>
            <div class="brand-features">
                <div class="brand-feature"><span class="dot"></span>Control de stock en tiempo real</div>
                <div class="brand-feature"><span class="dot"></span>Dashboard ejecutivo con métricas</div>
                <div class="brand-feature"><span class="dot"></span>Gestión multi-sucursal</div>
                <div class="brand-feature"><span class="dot"></span>Acceso seguro por roles</div>
            </div>
        </div>

        <div class="auth-form-side">
            <div class="auth-card">
                <h2>Medistock</h2>

                <!-- Tabs -->
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('login', this)">Iniciar Sesión</button>
                    <button class="tab-btn" onclick="switchTab('register', this)">Crear Cuenta</button>
                </div>

                <!-- LOGIN -->
                <div class="tab-panel active" id="tab-login">
                    <form id="login-form">
                        <div class="form-group">
                            <label for="email">Correo electrónico</label>
                            <input type="email" id="email" placeholder="usuario@medistock.cl" required autocomplete="email">
                        </div>
                        <div class="form-group">
                            <label for="password">Contraseña</label>
                            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                        </div>
                        <button type="submit" id="btn-login" class="btn btn-primary">
                            Ingresar al Sistema
                        </button>
                    </form>
                    <div id="message-login"></div>
                </div>

                <!-- REGISTRO -->
                <div class="tab-panel" id="tab-register">
                    <form id="register-form">
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.75rem;">
                            <div class="form-group">
                                <label for="reg-nombre">Nombre</label>
                                <input type="text" id="reg-nombre" placeholder="Juan" required>
                            </div>
                            <div class="form-group">
                                <label for="reg-apellido">Apellido</label>
                                <input type="text" id="reg-apellido" placeholder="Pérez" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="reg-rut">RUT</label>
                            <input type="text" id="reg-rut" placeholder="12345678-9" required>
                        </div>
                        <div class="form-group">
                            <label for="reg-email">Correo electrónico</label>
                            <input type="email" id="reg-email" placeholder="correo@ejemplo.cl" required>
                        </div>
                        <div class="form-group">
                            <label for="reg-password">Contraseña</label>
                            <input type="password" id="reg-password" placeholder="Mínimo 8 caracteres" required minlength="8">
                        </div>
                        <button type="submit" id="btn-register" class="btn btn-primary">
                            Crear Cuenta
                        </button>
                    </form>
                    <div id="message-register"></div>
                </div>

                <p style="margin-top:1.5rem; font-size:0.75rem; color:var(--text-muted); text-align:center;">
                    Acceso restringido a personal autorizado.
                </p>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        function switchTab(tab, el) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active');
        }
    </script>
</body>
</html>
